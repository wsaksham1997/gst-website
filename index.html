<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GST Download Configuration</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  padding: 30px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 8px;
}

label { display:block; margin-top:12px; font-weight:bold; }
input, select {
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing: border-box;
}

#monthProgress {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:10px;
}

.month-box {
  padding:8px;
  text-align:center;
  border-radius:6px;
  background:#ddd;
}
.month-running { background:#90caf9; }
.month-generating { background:#ffd54f; color:black; }
.month-done { background:#81c784; color:white; }
.month-failed { background:#e57373; color:white; }
.month-nil { background:#ffa726; color:black; } /* ADDED: ORANGE FOR NIL RETURN */

button {
  margin-top:15px;
  padding:10px;
  cursor:pointer;
}

.modal-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
}

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:9999;
}

.modal-content {
  background:white;
  width:420px;
  margin:10% auto;
  padding:20px;
  border-radius:8px;
  text-align:center;
}

#modalMessage {
  white-space: pre-wrap; 
  word-wrap: break-word;
  font-family: Arial, sans-serif;
  font-weight: bold;
}

#captchaImg {
  display:block;
  width:260px;
  height:auto;
  margin:15px auto;
  border:1px solid #ccc;
  background:#f0f0f0;
}
</style>
</head>

<body>

<div id="loginPage" class="container">
<h2>Software Login</h2>

<label>User ID</label>
<input id="loginId">

<label>Password</label>
<input id="loginPassword" type="password">

<button onclick="doLogin()">Login</button>

<p id="loginError" style="color:red;"></p>
</div>

<div id="indexPage" class="container" style="display:none;">
<h2 style="text-align:center;">GST Software - AKGVG</h2>
<button onclick="openGSTRPage()">Download GSTR 2B</button>
<button onclick="openGSTR2APage()">GSTR 2A Downloader</button>
</div>

<div id="gstrPage" style="display:none;">

<div class="container">
<h2>GST Portal Download</h2>

<label>Client Name</label>
<input id="clientName" placeholder="e.g., Cesta" value="DEFAULT">

<label>GSTIN</label>
<input id="gstid">

<label>Password</label>
<input id="password" type="password">

<label>Download Path</label>
<input id="path">

<label>Financial Year</label>
<select id="fy"></select>

<label>Month</label>
<select id="month"></select>

<label>
  <input type="checkbox" id="fullYear"> Entire FY
</label>

<label>Progress</label>
<div id="monthProgress"></div>

<button id="runBtn">Run Automation</button>
</div>

</div>


<div id="jobModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <pre id="modalMessage"></pre>
    <div class="modal-buttons">
      <button id="resumeBtn" style="display:none; background:#1976d2; color:white; border:none; border-radius:4px;" onclick="resumeJob()">Press to continue Downloading</button>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div id="captchaModal" class="modal">
  <div class="modal-content">
    <h3>Enter CAPTCHA</h3>
    <img id="captchaImg">
    <input id="captchaText" placeholder="Enter captcha">
    <div class="modal-buttons">
      <button id="captchaSubmitBtn">Submit Captcha</button>
      <button id="captchaRefreshBtn" onclick="refreshCaptcha()">🔄 Refresh</button>
    </div>
  </div>
</div>


<script>
const API_BASE = "http://192.168.1.85:5000"; 
const LOGIN_API = "http://192.168.1.85:5001/login";
const API_2A = "http://192.168.1.85:5002";

let CURRENT_JOB_ID = null;
let POLL_TIMER = null;
let POLLING_PAUSED = false;
let CURRENT_MODE = null;
let CURRENT_API = null;

const NETWORK_ERROR_MSG = "Unable to communicate with the automation server. Please verify your network connection and ensure the server is running, then try again.";

/* 🔐 LOGIN */
function doLogin(){

  const id = document.getElementById("loginId").value;
  const pass = document.getElementById("loginPassword").value;

  fetch(LOGIN_API,{
      method:"POST",
      headers:{
          "Content-Type":"application/json"
      },
      body:JSON.stringify({
          login_id: document.getElementById("loginId").value,
          password: document.getElementById("loginPassword").value
      })
  })
  .then(async r=>{
      const data = await r.json();
      if(!r.ok){
          throw new Error(data.message || "Login failed");
      }
      return data;
  })
  .then(d=>{
      if(d.status==="success"){
          document.getElementById("loginPage").style.display="none";
          document.getElementById("indexPage").style.display="block";
          document.getElementById("gstrPage").style.display="none";
      } else {
          alert("Invalid credentials");
      }
  })
  .catch(e=>{
      alert("Connection Error: " + NETWORK_ERROR_MSG);
  });

}

function openGSTRPage(){
  CURRENT_MODE = "2B";
  CURRENT_API = API_BASE;
  document.getElementById("indexPage").style.display="none";
  document.getElementById("gstrPage").style.display="block";
}
function openGSTR2APage(){
  CURRENT_MODE = "2A";
  CURRENT_API = API_2A;
  document.getElementById("indexPage").style.display="none";
  document.getElementById("gstrPage").style.display="block";
}

/* INIT FY & MONTH */
const fy = document.getElementById("fy");
const month = document.getElementById("month");
const fullYear = document.getElementById("fullYear");

const months = ["April","May","June","July","August","September",
"October","November","December","January","February","March"];

const y = new Date().getFullYear();
for (let i=2017;i<=y;i++) {
  fy.add(new Option(`${i}-${String(i+1).slice(-2)}`,`${i}-${String(i+1).slice(-2)}`));
}
months.forEach(m=>month.add(new Option(m,m)));
fullYear.onchange=e=>month.disabled=e.target.checked;

/* UI HELPERS */
function renderMonths(list){
  const box=document.getElementById("monthProgress");
  box.innerHTML="";
  list.forEach(m=>{
    const d=document.createElement("div");
    d.id="m-"+m;
    d.className="month-box";
    d.innerText=m;
    box.appendChild(d);
  });
}

function showModal(t,m){
  modalTitle.innerText=t;
  modalMessage.style.color = t.includes("Failed") || t.includes("Error") || t.includes("Lost") ? "#d32f2f" : "#333";
  modalMessage.innerText=m;
  jobModal.style.display="block";
}
function closeModal(){ jobModal.style.display="none"; }

/* CAPTCHA */
function showCaptcha(jobId){
  if (captchaModal.style.display === "block") return;

  POLLING_PAUSED = true;
  captchaText.value = "";
  captchaModal.style.display = "block";

  setTimeout(() => {
    captchaImg.src =
      `${CURRENT_API}/captcha/${jobId}?t=${Date.now()}&r=${Math.random()}`;
  }, 100);
}

function refreshCaptcha() {
  if (!CURRENT_JOB_ID) return;
  
  const refreshBtn = document.getElementById("captchaRefreshBtn");
  refreshBtn.disabled = true;
  refreshBtn.innerText = "Refreshing...";

  fetch(`${CURRENT_API}/refresh-captcha/${CURRENT_JOB_ID}`, {
    method: "POST"
  })
  .then(r => r.json())
  .then(d => {
    if(d.status === "CAPTCHA_REFRESHED") {
      captchaImg.src = `${CURRENT_API}/captcha/${CURRENT_JOB_ID}?t=${Date.now()}&r=${Math.random()}`;
      captchaText.value = ""; 
    } else {
      alert("Failed to refresh captcha: " + (d.error || "Unknown error"));
    }
  })
  .catch(e => {
    console.error("Error refreshing captcha:", e);
    alert("Connection Error: " + NETWORK_ERROR_MSG);
  })
  .finally(() => {
    refreshBtn.disabled = false;
    refreshBtn.innerText = "🔄 Refresh";
  });
}

captchaSubmitBtn.onclick = () => {
  const text = captchaText.value.trim();
  if (!text) return alert("Enter captcha");

  fetch(`${CURRENT_API}/submit-captcha/${CURRENT_JOB_ID}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({captcha:text})
  })
  .then(()=>{
    captchaModal.style.display="none";
    captchaImg.src = "";
    POLLING_PAUSED = false;
  })
  .catch(e => {
    alert("Connection Error: " + NETWORK_ERROR_MSG);
  });
};

/* DOWNLOAD */
async function autoDownload(url){
  try {
    const r=await fetch(url);
    const b=await r.blob();
    const a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download=`GSTR_${CURRENT_MODE}_Download.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    showModal("Download Failed", "The file is ready, but we lost connection to the server. Please check your network and try again.");
  }
}

/* POLLING */
function poll(jobId){
  POLL_TIMER = setInterval(()=>{
    if (POLLING_PAUSED) return;

    const statusRoute = (CURRENT_MODE === "2A") ? "job-status-2a" : "job-status";
    fetch(`${CURRENT_API}/${statusRoute}/${jobId}`)
    .then(r=>r.json())
    .then(d=>{

      if (d.status==="WAITING_FOR_CAPTCHA"){
        showCaptcha(jobId);
        return;
      }

      /* FATAL FAILURES & ZOMBIE FILE ERRORS */
      if (d.status==="FAILED"){
        clearInterval(POLL_TIMER);
        document.getElementById("captchaModal").style.display="none"; 
        POLLING_PAUSED = false;
        showModal("Authentication / Server Error", d.error || "An unknown error occurred.");
        document.getElementById("resumeBtn").style.display = "inline-block";
        return;
      }

      Object.entries(d.months||{}).forEach(([m,s])=>{
        const el=document.getElementById("m-"+m);
        if(!el)return;
        el.className="month-box "+
          (s==="RUNNING"?"month-running":
           s==="GENERATING"?"month-generating":
           s==="COMPLETED"?"month-done":
           s==="NIL_RETURN"?"month-nil": 
           s==="FAILED" || s==="FAILED_AGAIN"?"month-failed":"");
      });

      if(d.status==="COMPLETED"){
        clearInterval(POLL_TIMER);
        
        let msg = "Download will start automatically.";
        let nilMonths = [];
        Object.entries(d.months||{}).forEach(([m, s]) => {
            if (s === "NIL_RETURN") nilMonths.push(m);
        });
        if (nilMonths.length > 0) {
            msg += "\n\nNote: The following months had no data (Nil Returns): " + nilMonths.join(", ");
        }

        showModal("Completed", msg);
        document.getElementById("resumeBtn").style.display = "none";
        autoDownload(CURRENT_API + d.download_url);
      }
    })
    .catch(e => {
        // CATCH NETWORK DROPS DURING POLLING
        clearInterval(POLL_TIMER);
        document.getElementById("captchaModal").style.display="none"; 
        POLLING_PAUSED = false;
        showModal("Connection Lost", NETWORK_ERROR_MSG);
        document.getElementById("resumeBtn").style.display = "inline-block"; 
    });
  },4000);
}

/* THE TRIGGER LOGIC */
function triggerRun(isResume = false) {
  if (!CURRENT_MODE) {
    alert("Please select 2A or 2B from index page.");
    return;
  }

  const all = fullYear.checked;
  renderMonths(all ? months : [month.value]);

  let runUrl = CURRENT_MODE === "2B" ? `${API_BASE}/run-gstr2b` : `${API_2A}/run-gstr2a`;
  
  // Get dynamic client name
  const cName = document.getElementById("clientName").value.trim() || "DEFAULT";

  fetch(runUrl,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      gstin: gstid.value,
      password: password.value,
      fy: fy.value,
      only_fy: all,
      month: all ? "" : month.value,
      path: path.value,
      client: cName,
      resume: isResume 
    })
  })
  .then(r=>r.json())
  .then(d=>{
    CURRENT_JOB_ID = d.job_id;
    showModal(isResume ? "Resuming Job..." : "Started", `Job ID: ${d.job_id}`);
    document.getElementById("resumeBtn").style.display = "none";
    poll(d.job_id);
  })
  .catch(e => {
    showModal("Connection Error", NETWORK_ERROR_MSG);
    document.getElementById("resumeBtn").style.display = "none";
  });
}

runBtn.onclick = () => triggerRun(false);

function resumeJob() {
  closeModal();
  triggerRun(true);
}

</script>

</body>
</html>
